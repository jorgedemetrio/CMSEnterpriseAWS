apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-admin
  namespace: cmsaws
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-admin
  template:
    metadata:
      labels:
        app: frontend-admin
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend-admin
          image: newsflow/cmsaws-frontend-admin:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"
            limits:
              memory: "256Mi"
