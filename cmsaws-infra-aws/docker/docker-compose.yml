services:
  cmsaws-service-core:
    build:
      context: ../../cmsaws-backend-java/cmsaws-service-core
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/newsflow
      DB_USERNAME: newsflow
      DB_PASSWORD: newsflow
    depends_on:
      - postgres
      - redis
      - elasticsearch
    ports:
      - "8081:8080"

  cmsaws-service-users:
    build:
      context: ../../cmsaws-backend-java/cmsaws-service-users
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/newsflow
      DB_USERNAME: newsflow
      DB_PASSWORD: newsflow
    depends_on:
      - postgres
      - redis
      - elasticsearch
    ports:
      - "8082:8080"

  cmsaws-service-contacts:
    build:
      context: ../../cmsaws-backend-java/cmsaws-service-contacts
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/newsflow
      DB_USERNAME: newsflow
      DB_PASSWORD: newsflow
    depends_on:
      - postgres
      - redis
      - elasticsearch
    ports:
      - "8083:8080"

  cmsaws-service-forum:
    build:
      context: ../../cmsaws-backend-java/cmsaws-service-forum
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/newsflow
      DB_USERNAME: newsflow
      DB_PASSWORD: newsflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - kafka
    ports:
      - "8084:8080"

  cmsaws-worker-forum:
    build:
      context: ../../cmsaws-backend-java/cmsaws-worker-forum
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/newsflow
      DB_USERNAME: newsflow
      DB_PASSWORD: newsflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - kafka

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  cmsaws-frontend-user:
    build:
      context: ../../cmsaws-frontend-user
      dockerfile: Dockerfile
    depends_on:
      - cmsaws-service-core
    ports:
      - "5173:80"

  cmsaws-frontend-admin:
    build:
      context: ../../cmsaws-frontend-admin
      dockerfile: Dockerfile
    depends_on:
      - cmsaws-service-core
      - cmsaws-service-users
    ports:
      - "4200:80"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsflow
      POSTGRES_PASSWORD: newsflow
      POSTGRES_DB: newsflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  elastic_data: