spring:
  application:
    name: cmsaws-service-forum
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/newsflow}
    username: ${DB_USERNAME:newsflow}
    password: ${DB_PASSWORD:newsflow}
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

newsflow:
  kafka:
    topic-forum-events: ${KAFKA_TOPIC_FORUM_EVENTS:forum.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info