spring:
  application:
    name: cmsaws-service-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/newsflow}
    username: ${DB_USERNAME:newsflow}
    password: ${DB_PASSWORD:newsflow}
  jpa:
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus