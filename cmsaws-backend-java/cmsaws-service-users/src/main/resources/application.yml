spring:
  application:
    name: cmsaws-service-users
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/newsflow}
    username: ${DB_USERNAME:newsflow}
    password: ${DB_PASSWORD:newsflow}
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

clients:
  core:
    url: ${CORE_API_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus