name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  backend-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend modules
        run: mvn -B -f cmsaws-backend-java/pom.xml clean verify

  lambdas-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build lambda modules
        run: mvn -B -f cmsaws-lambdas-java/pom.xml clean verify

  frontend-user:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmsaws-frontend-user
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cmsaws-frontend-user/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend user
        run: npm run build

  frontend-user-e2e:
    runs-on: ubuntu-latest
    needs: frontend-user
    defaults:
      run:
        working-directory: cmsaws-frontend-user
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cmsaws-frontend-user/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: cmsaws-frontend-user/playwright-report/
          if-no-files-found: ignore
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: cmsaws-frontend-user/test-results/
          if-no-files-found: ignore

  frontend-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmsaws-frontend-admin
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cmsaws-frontend-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend admin
        run: npm run build